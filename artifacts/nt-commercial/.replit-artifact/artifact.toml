kind = "video"
previewPath = "/commercial/"
title = "NeighborhoodTruth Commercial"
version = "1.0.0"
id = "artifacts/nt-commercial"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/commercial/" ]
localPort = 18113

[services.development]
run = "pnpm --filter @workspace/nt-commercial run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nt-commercial", "run", "build" ]
publicDir = "artifacts/nt-commercial/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18113"
BASE_PATH = "/commercial/"
