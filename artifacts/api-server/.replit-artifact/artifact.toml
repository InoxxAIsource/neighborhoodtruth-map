kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = [
  "/",
  "/api",
  "/sitemap.xml",
  "/robots.txt",
  "/llms.txt",
  "/new-york",
  "/san-francisco",
  "/los-angeles",
  "/toronto",
  "/mexico-city",
  "/buenos-aires",
  "/london",
  "/amsterdam",
  "/rome",
  "/istanbul",
  "/tel-aviv",
  "/jerusalem",
  "/tehran",
  "/cairo",
  "/cape-town",
  "/tokyo",
  "/seoul",
  "/hong-kong",
  "/bali",
  "/karachi",
  "/lahore",
  "/mumbai",
  "/delhi",
  "/bangalore",
  "/hyderabad",
  "/pune",
  "/chennai",
  "/kolkata",
  "/ahmedabad",
  "/jaipur",
  "/lucknow",
  "/chandigarh",
  "/goa",
  "/indore",
  "/coimbatore"
]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["sh", "-c", "pnpm --filter @workspace/neighborhood-truth run build && pnpm --filter @workspace/api-server run build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"
PORT = "3000"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
