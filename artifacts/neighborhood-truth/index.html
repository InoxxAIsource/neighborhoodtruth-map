<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>PlaceLabels | Honest Neighborhood Reviews from Real Locals</title>
    <meta name="description" content="Discover real neighborhood vibes from locals. Drop labels, vote on insights &amp; find your perfect area. 500+ authentic reviews across the world." />
    <meta name="keywords" content="neighborhood reviews, local insights, crowd-sourced map, neighborhood ratings, area safety, neighborhood vibes, city guide" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://placelabels.com/" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#0d9488" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="PlaceLabels" />
    <meta property="og:title" content="PlaceLabels | Honest Neighborhood Reviews from Real Locals" />
    <meta property="og:description" content="Discover real neighborhood vibes from locals. Drop labels, vote on insights &amp; find your perfect area. 500+ authentic reviews across the world." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://placelabels.com/" />
    <meta property="og:image" content="https://placelabels.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@placelabels" />
    <meta name="twitter:title" content="PlaceLabels | Honest Neighborhood Reviews from Real Locals" />
    <meta name="twitter:description" content="Discover real neighborhood vibes from locals. Drop labels, vote on insights &amp; find your perfect area." />
    <meta name="twitter:image" content="https://placelabels.com/og-image.png" />

    <!-- Fonts: non-blocking via print media swap (mobile LCP fix) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    </noscript>

    <!-- Google Analytics: deferred until after page load (mobile FCP fix) -->
    <script>
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-3DYJNWSKJP';
        s.async = true;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-3DYJNWSKJP');
      });
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "PlaceLabels",
      "legalName": "PlaceLabels",
      "alternateName": "NeighborhoodTruth",
      "url": "https://placelabels.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://placelabels.com/icons/icon-192.png",
        "width": 192,
        "height": 192
      },
      "description": "Crowd-sourced global neighborhood map with honest local insights, safety ratings, and community-verified area reviews.",
      "sameAs": [
        "https://twitter.com/placelabels",
        "https://github.com/InoxxAIsource/neighborhoodtruth-map"
      ]
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PlaceLabels",
      "alternateName": "NeighborhoodTruth",
      "url": "https://placelabels.com",
      "description": "Discover real neighborhood vibes from locals across the world.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://placelabels.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is PlaceLabels?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PlaceLabels is a crowd-sourced global neighborhood map where locals drop honest labels about areas — covering safety, cost of living, vibe, and more. Anyone can vote on existing insights or add their own."
          }
        },
        {
          "@type": "Question",
          "name": "How do I add a neighborhood label?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Click the 'Drop Label' button, then tap anywhere on the map to place your pin. Fill in the neighborhood name, safety rating (1–5), cost level, and vibe tags, then submit. Your label appears instantly on the map for others to vote on."
          }
        },
        {
          "@type": "Question",
          "name": "How is neighborhood safety rated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Safety is rated on a 1–5 scale by local contributors: 1 is unsafe, 5 is very safe. Each label's safety score is set by the person who drops it, and other community members can upvote or downvote to validate the insight."
          }
        },
        {
          "@type": "Question",
          "name": "Is PlaceLabels free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, PlaceLabels is completely free. You can browse the map, read neighborhood insights, vote on labels, and add your own labels without creating an account."
          }
        },
        {
          "@type": "Question",
          "name": "Which cities are covered?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PlaceLabels has community-contributed labels for neighborhoods in major cities worldwide including New York, London, Paris, Tokyo, Dubai, Singapore, Sydney, Berlin, Barcelona, Bangkok, Seoul, Mumbai, Cairo, and many more. New labels can be added anywhere in the world."
          }
        }
      ]
    }
    </script>

    <!-- JSON-LD: BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://placelabels.com/"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
