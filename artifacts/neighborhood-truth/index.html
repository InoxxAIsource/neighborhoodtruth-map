<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>PlaceLabels | Honest Neighborhood Reviews from Real Locals</title>
    <meta name="description" content="Discover real neighborhood vibes from locals. Drop labels, vote on insights &amp; find your perfect area. 500+ authentic reviews across the world." />
    <meta name="keywords" content="neighborhood reviews, local insights, crowd-sourced map, neighborhood ratings, area safety, neighborhood vibes, city guide" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://placelabels.com/" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#0d9488" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />

    <!-- Critical: preload map poster at highest priority (mobile LCP fix) -->
    <link rel="preload" as="image" href="./map-poster.jpg" fetchpriority="high">

    <!-- Inline critical CSS: text + layout renders before any stylesheet loads -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8e0d8; }
      #root { height: 100%; }
      .map-poster { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>

    <!-- Open Graph -->
    <meta property="og:site_name" content="PlaceLabels" />
    <meta property="og:title" content="PlaceLabels | Honest Neighborhood Reviews from Real Locals" />
    <meta property="og:description" content="Discover real neighborhood vibes from locals. Drop labels, vote on insights &amp; find your perfect area. 500+ authentic reviews across the world." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://placelabels.com/" />
    <meta property="og:image" content="https://placelabels.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@placelabels" />
    <meta name="twitter:title" content="PlaceLabels | Honest Neighborhood Reviews from Real Locals" />
    <meta name="twitter:description" content="Discover real neighborhood vibes from locals. Drop labels, vote on insights &amp; find your perfect area." />
    <meta name="twitter:image" content="https://placelabels.com/og-image.png" />

    <!-- Fonts: non-blocking via print media swap (mobile LCP fix) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    </noscript>

    <!-- Google Analytics: deferred until after page load (mobile FCP fix) -->
    <script>
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-3DYJNWSKJP';
        s.async = true;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-3DYJNWSKJP');
      });
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "PlaceLabels",
      "legalName": "PlaceLabels",
      "alternateName": "NeighborhoodTruth",
      "url": "https://placelabels.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://placelabels.com/icons/icon-192.png",
        "width": 192,
        "height": 192
      },
      "description": "Crowd-sourced global neighborhood map with honest local insights, safety ratings, and community-verified area reviews.",
      "sameAs": [
        "https://twitter.com/placelabels",
        "https://github.com/InoxxAIsource/neighborhoodtruth-map"
      ]
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PlaceLabels",
      "alternateName": "NeighborhoodTruth",
      "url": "https://placelabels.com",
      "description": "Discover real neighborhood vibes from locals across the world.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://placelabels.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://placelabels.com/"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Poster renders instantly before any JS — becomes the LCP element -->
      <img
        src="./map-poster.jpg"
        fetchpriority="high"
        decoding="async"
        alt="World neighborhood map"
        style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;"
      >
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
